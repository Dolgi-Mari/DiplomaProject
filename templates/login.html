{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-body p-4 p-md-5"> <!-- увеличенные внутренние отступы -->
                <h1 class="mb-4 text-center display-5">Вход</h1> <!-- более крупный заголовок -->
                <form method="POST" action="/login">
                    {% if next %}
                        <input type="hidden" name="next" value="{{ next }}">
                    {% endif %}
                    <div class="mb-4">
                        <label for="username" class="form-label form-label-lg fs-5">Имя пользователя</label>
                        <input type="text" class="form-control " id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label form-label-lg fs-5">Пароль</label>
                        <input type="password" class="form-control " id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 py-2">Войти</button>
                    <a href="/register" class="btn btn-link w-100 text-center mt-3 fs-5">Нет аккаунта? Зарегистрируйтесь</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
