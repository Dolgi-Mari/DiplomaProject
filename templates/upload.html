{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="text-center mb-4">
            <h1 class="fw-semibold">📤 Загрузка книг и документов</h1>
            <p class="text-muted">Поддерживаются EPUB, PDF, FB2, DOCX, TXT, RTF</p>
        </div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <h5 class="card-title mb-3 text-primary">
                    👤 {{ user.username }}
                </h5>

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="files" class="form-label fw-semibold">Выберите файлы</label>
                        <input class="form-control" type="file" id="files" name="files[]" multiple
                               accept=".epub,.pdf,.fb2,.docx,.txt,.rtf">
                        <div class="form-text mt-2">Можно выбрать несколько файлов за раз.</div>
                        <!-- Контейнер для отображения списка выбранных файлов -->
                        <div id="fileListContainer" class="mt-3 small text-secondary" style="display: none;">
                            <strong>Выбранные файлы:</strong>
                            <ul id="fileList" class="mb-0 mt-1"></ul>
                        </div>
                    </div>
                    <div class="d-flex flex-column flex-sm-row justify-content-end gap-3 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg px-4">Загрузить</button>
                        <a href="/profile/{{ user.id }}" class="btn btn-outline-secondary btn-lg px-4">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('files');
    const fileListContainer = document.getElementById('fileListContainer');
    const fileList = document.getElementById('fileList');

    fileInput.addEventListener('change', function() {
        const files = Array.from(fileInput.files);
        if (files.length === 0) {
            fileListContainer.style.display = 'none';
            fileList.innerHTML = '';
            return;
        }

        // Очищаем предыдущий список
        fileList.innerHTML = '';
        files.forEach(file => {
            const li = document.createElement('li');
            li.textContent = file.name;
            fileList.appendChild(li);
        });
        fileListContainer.style.display = 'block';
    });
</script>
{% endblock %}
