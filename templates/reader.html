{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reader.css') }}">
{% endblock %}

{% block body_attributes %}class="reader-page {{ body_classes }}" style="{{ style_vars }}"{% endblock %}

{% block content %}
<div class="progress-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #f0f0f0; z-index: 1100;">
    <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent, #006BAE);"></div>
</div>
<div class="container py-4">
    <div id="book-content">
        {{ book_content | safe }}
    </div>
</div>

<a href="/profile/{{ user_id }}" class="btn-exit">← Выйти</a>

<script>
    // Применяем классы и стили
    document.body.className = "reader-page {{ body_classes }}";

    // Восстановление позиции при загрузке (безопасная вставка числа)
    var lastPosition = {{ last_position | tojson }};
    if (lastPosition && lastPosition > 0) {
        window.scrollTo(0, lastPosition);
    }

    // Обновление полоски прогресса
    function updateProgressBar() {
        var scrollTop = window.scrollY;
        var scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
        var progress = (scrollTop / scrollHeight) * 100;
        var progressBar = document.getElementById('progressBar');
        if (progressBar) progressBar.style.width = progress + '%';
    }

    // Сохранение позиции при скролле (с задержкой)
    var saveTimeout;
    function savePosition() {
        var position = window.scrollY;
        fetch('/save_position/{{ book.id }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ position: position })
        });
    }

    window.addEventListener('scroll', function() {
        updateProgressBar();
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(savePosition, 500);
    });

    // Инициализация
    updateProgressBar();
</script>
{% endblock %}
