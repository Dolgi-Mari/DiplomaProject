{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reader.css') }}">
{% endblock %}

{% block body_attributes %}class="{{ body_classes }}" style="{{ style_vars }}"{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-end mb-3">
        <a href="/profile/{{ user_id }}" class="btn btn-outline-secondary">← Выйти из читалки</a>
    </div>
    <div id="book-content">
        {{ book_content | safe }}
    </div>
    <div class="d-flex justify-content-center mt-4">
        <a href="/profile/{{ user_id }}" class="btn btn-outline-secondary">Выйти</a>
    </div>
</div>

<script>
    // Просто применяем классы и стили, переданные сервером (без дополнительных обработчиков)
    document.body.className = "{{ body_classes }}";
</script>
{% endblock %}
